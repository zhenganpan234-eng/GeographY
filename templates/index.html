<form action="/search" method="POST">
        <div class="form-group">
            <label for="start_place">📍 散步出發地:</label>
            <input type="text" id="start_place" name="start_place" placeholder="例如：台北車站 或 清華大學" required style="width: 90%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        </div>

        <div class="form-group">
            <label for="end_place">🏁 靈魂目的地:</label>
            <input type="text" id="end_place" name="end_place" placeholder="例如：台北101 或 新竹動物園" required style="width: 90%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        </div>

        <div class="form-group">
            <label for="social_energy">⚡ 社交能量值 (0 ~ 100):</label>
            <input type="range" id="social_energy" name="social_energy" min="0" max="100" value="80" oninput="this.nextElementSibling.value = this.value">
            <output>80</output>
        </div>

        <div class="form-group">
            <label for="mood">🎭 當前情緒偏好:</label>
            <select id="mood" name="mood" style="padding: 8px; border-radius: 4px;">
                <option value="放鬆">放鬆 (咖啡廳)</option>
                <option value="文青">文青 (書店)</option>
                <option value="社交">社交 (商圈)</option>
            </select>
        </div>

        <input type="submit" value="啟動動態靈魂導航" style="margin-top: 10px;">
    </form>
